<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LALA Cafe | Premium Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Cafe</div>
        
        <!-- ส่วนควบคุมเมนูมือถือ -->
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">☰</label>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>เลือกเมนูโปรดของคุณ</h1>
    </header>

    <main class="menu-container">
        <div class="card-grid">
            <!-- เมนูที่ 1 -->
            <div class="menu-card">
                <img src="img/download.jpg" alt="Espresso" class="menu-img">
                <div class="info">
                    <h3>Classic Milk Tea</h3>
                    <p>ชานมไต้หวันต้นตำรับ หอมนุ่มละมุนลิ้น</p>
                    <span class="price">฿65</span>
                    <button class="order-btn">เลือกเมนู</button>
                </div>
            </div>
            <!-- เมนูที่ 2 -->
            <div class="menu-card">
                <img src="img/8d3c9c0a7dacf7a075a43f8b8eb0c683.jpg" alt="Latte" class="menu-img">
                <div class="info">
                    <h3>Strawberry Berry</h3>
                    <p>สตรอว์เบอร์รี่สด ผสมนมฮอกไกโดแท้</p>
                    <span class="price">฿90</span>
                    <button class="order-btn">เลือกเมนู</button>
                </div>
            </div>
            <!-- เมนูที่ 3 -->
            <div class="menu-card">
                <img src="img/91f6215417e9fd1c24703b8b8a4cc1d9.jpg" alt="Green Tea" class="menu-img">
                <div class="info">
                    <h3>Matcha Latte</h3>
                    <p>มัทฉะเข้มข้น </p>
                    <span class="price">฿130</span>
                    <button class="order-btn">เลือกเมนู</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
